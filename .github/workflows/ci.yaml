# Requires GitHub secrets
# - CODECOV_TOKEN

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  linters:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install poetry
        run: |
          python -m pip install -U poetry==2.2.0

      - name: Install dependencies
        run: |
          python -m poetry install --no-interaction

      - name: Run linters
        run: |
          python -m poetry run poe lint

  tests-matrix:
    name: OS ${{ matrix.os.name }} / Python ${{ matrix.python-version }} / poetry ${{ matrix.poetry-version }}
    runs-on: ${{ matrix.os.image }}
    strategy:
      matrix:
        os:
          - name: Ubuntu
            image: ubuntu-22.04
        python-version: ["3.9", "3.13"]
        poetry-version: ["1.7.0", "2.2.0"]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install "poetry==${{ matrix.poetry-version }}"

      - name: Install dependencies
        run: |
          python -m poetry install --no-interaction --only main --only tests

      - name: Run tests
        id: run-tests
        run: |
          python -m poetry run pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: OS ${{ matrix.os.name }} / Python ${{ matrix.python-version }} / poetry ${{ matrix.poetry-version }}
