# Requires GitHub secrets
# - CODECOV_TOKEN

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  linters:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install poetry
        run: |
          python -m pip install -U poetry==2.2.0

      - name: Install dependencies
        run: |
          python -m poetry install --no-interaction

      - name: Run linters
        run: |
          just lint

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Poetry
        run: |
          python -m pip install poetry==2.2.0

      - name: Install dependencies
        run: |
          python -m poetry install --no-interaction --only main --only tests

      - name: Run tests
        run: |
          just test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
